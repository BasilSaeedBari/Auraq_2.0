          Exponential functions: ["exponential", "e\\^x", "e\\^-x"]
      "4":
        name: "Mechanics"
        topics:
          - "Forces and equilibrium"
          - "Kinematics of motion in a straight line"
          - "Momentum"
          - "Newton's laws of motion"
          - "Energy, work and power"
        keyword_rules:
          Forces and equilibrium: ["force", "equilibrium", "tension", "friction", "coefficient of friction", "\\bmu\\b", "normal contact force", "coplanar forces", "component", "resolve"]
          Kinematics of motion in a straight line: ["kinematics", "velocity", "acceleration", "displacement", "straight line", "deceleration", "t\\s*=\\s*0", "speed", "distance", "retardation"]
          Momentum: ["momentum", "collision", "coalesce", "speed after collision", "impulse", "conservation of momentum"]
          Newton's laws of motion: ["newton", "mass", "pulley", "string", "light inextensible", "smooth pulley", "connected particles"]
          Energy, work and power: ["energy", "work", "power", "kinetic energy", "potential energy", "loss of energy", "work done", "instantaneous power", "engine", "constant speed"]
      "5":
        name: "Probability & Statistics 1"
        topics:
          - "Representation of data"
          - "Measures of location"
          - "Measures of spread"
          - "Permutations and combinations"
          - "Probability"
          - "Discrete random variables"
          - "The binomial distribution"
          - "The normal distribution"
        keyword_rules:
          Representation of data: ["box-and-whisker plot", "stem-and-leaf diagram", "cumulative frequency", "histogram", "frequency density", "bar chart", "pie chart"]
          Measures of location: ["mean", "median", "modal class", "percentile"]
          Measures of spread: ["standard deviation", "variance", "interquartile range", "range"]
          Permutations and combinations: ["permutation", "combination", "selections", "arrangements", "arranged in a circle", "how many different", "together", "separate", "choose"]
          Probability: ["probability", "independent events", "conditional probability", "probability tree", "venn diagram", "mutually exclusive"]
          Discrete random variables: ["discrete random variable", "probability distribution table", "expectation", "e\\(x\\)", "var\\(x\\)", "expected value", "fair die", "discrete distribution", "geometric distribution"]
          The binomial distribution: ["binomial distribution", "binomially distributed"]
          The normal distribution: ["normal distribution", "standard normal", "mean mu", "variance sigma", "probability density", "approximation to", "continuity correction", "z-score", "normally distributed"]
      "6":
        name: "Probability & Statistics 2"
        topics:
          - "The Poisson distribution"
          - "Linear combinations of random variables"
          - "Continuous random variables"
          - "Sampling and estimation"
          - "Hypothesis tests"
        keyword_rules:
          The Poisson distribution: ["poisson", "mean lambda", "probability density", "poisson distribution"]
          Linear combinations of random variables: ["linear combination", "independent normal", "random variable x and y", "sum of"]
          Continuous random variables: ["continuous random variable", "probability density function", "f\\(x\\)\\s*=\\s*", "median", "interquartile range"]
          Sampling and estimation: ["sampling", "unbiased estimate", "population variance", "confidence interval", "mean of a random sample"]
          Hypothesis tests: ["hypothesis test", "null hypothesis", "alternative hypothesis", "significance level", "type i error", "type ii error", "critical region"]

