Cambridge A-Levels:
  "9709":
    name: "Mathematics"
    beh_slug: "mathematics-9709"
    dp_slug: "maths"
    papers:
      "1":
        name: "Pure Mathematics 1"
        topics:
          - "Quadratics"
          - "Functions"
          - "Coordinate geometry"
          - "Coordinate geometry of Circles"
          - "Circular measure"
          - "Trigonometry"
          - "AP"
          - "GP"
          - "Binomial"
          - "Differentiation"
          - "Integration"
        keyword_rules:
          Quadratics: ["quadratic", "discriminant", "real roots", "no real roots", "distinct roots", "completed square", "completing the square", "parabola", "vertex", "meets the curve at a single point", "tangent to the curve"]
          Functions: ["domain", "range", "composite", "composite function", "inverse function", "one-to-one", "fg\\(x\\)", "gf\\(x\\)", "f\\^-1", "g\\^-1", "transformations?", "transformed", "graph of y\\s*=\\s*f\\(x\\)", "mapping", "transformation of graphs"]
          Coordinate geometry: ["coordinate geometry", "perpendicular bisector", "gradient of", "midpoint", "straight line", "passes through", "distance between", "equation of the line", "gradient", "intercept", "y-intercept", "x-intercept"]
          Coordinate geometry of Circles: ["equation of the circle", "centre of the circle", "radius of the circle", "tangent to the circle"]
          Circular measure: ["circular measure", "sector", "arc length", "radians?", "perimeter of the shaded", "area of the shaded", "chord", "segment", "perimeter of the region", "area of the region", "angle poq"]
          Trigonometry: ["trigonometric", "prove the identity", "solve the equation for", "sin", "cos", "tan", "cosec", "sec", "cot", "trigonometry", "sine", "cosine", "tangent", "sin x", "cos x", "tan x", "sin \\theta", "cos \\theta", "tan \\theta"]
          AP: ["arithmetic progression", "sum of the first", "common difference", "arithmetic series"]
          GP: ["geometric progression", "sum to infinity", "common ratio", "geometric series"]
          Binomial: ["binomial expansion", "coefficient of", "term independent of", "expansion of", "binomial theorem"]
          Differentiation: ["differentiation", "derivative", "stationary point", "increasing function", "decreasing function", "rate of change", "maximum point", "minimum point", "tangents?", "normals?", "d/dx", "first derivative", "second derivative"]
          Integration: ["integration", "integrate", "area of the region", "bounded by the curve", "volume of revolution", "definite integral", "dy/dx", "find the equation of the curve", "bounded by the y-axis", "bounded by the x-axis"]
      "2":
        name: "Pure Mathematics 2"
        topics:
          - "Algebra"
          - "Logarithms and Exponential Functions"
          - "Trigonometry"
          - "Differentiation"
          - "Integration"
          - "Numerical Solutions of Equations"
        keyword_rules:
          Algebra: ["partial fractions", "quotient", "remainder", "factor theorem", "polynomial", "divided by", "remainder theorem"]
          Logarithms and Exponential Functions: ["logarithm", "exponential", "ln\\s+", "e\\^x", "e\\^-x", "solve for x using logarithms"]
          Trigonometry: ["trigonometric", "solve the equation", "sin", "cos", "tan", "sec", "cosec", "cot"]
          Differentiation: ["derivative", "stationary point", "rate of change", "differentiation"]
          Integration: ["integration", "integrate", "definite integral"]
          Numerical Solutions of Equations: ["numerical solution", "iteration", "iterative formula", "converges", "change of sign"]
      "3":
        name: "Pure Mathematics 3"
        topics:
          - "Algebra"
          - "polynomials"
          - "modulus function"
          - "partial fractions"
          - "binomial expansion"
          - "Logarithmic functions"
          - "Trigonometry"
          - "Differentiation"
          - "Integration"
          - "Numerical solution of equations"
          - "Vectors"
          - "Differential equations"
          - "Complex numbers"
          - "Exponential functions"
        keyword_rules:
          Algebra: ["algebra", "partial fractions", "quotient", "remainder", "factor theorem", "polynomial", "divided by", "remainder theorem"]
          polynomials: ["polynomial", "quotient", "remainder", "factor theorem", "remainder theorem", "divided by"]
          modulus function: ["modulus", "solve the inequality", "\\|.*\\|", "modulus function"]
          partial fractions: ["partial fractions"]
          binomial expansion: ["binomial expansion", "coefficient of", "expansion of"]
          Logarithmic functions: ["logarithm", "ln\\s+", "solve for x using logarithms"]
          Trigonometry: ["trigonometric", "solve the equation", "sin", "cos", "tan", "sec", "cosec", "cot", "compound angle", "double angle"]
          Differentiation: ["derivative", "stationary point", "rate of change", "differentiation", "implicit", "parametric"]
          Integration: ['integration', 'integrate', 'definite integral', 'substitution', 'by parts', 'volume of revolution', 'area of the region', '∫']
          Numerical solution of equations: ["numerical solution", "iteration", "iterative formula", "converges", "change of sign", "iterative method"]
          Vectors: ["vector", "line l", "plane", "position vector", "perpendicular lines", "parallel planes", "direction vector", "angle between the lines"]
          Differential equations: ["differential equation", "variables separable", "solve the differential equation", "rate of increase", "proportional to"]
